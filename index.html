<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Choice | Premium Crunchy Muesli</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#a0144f;
  --secondary:#d81b60;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{background:#fff;color:#111;line-height:1.6;}

header{
  position:fixed;width:100%;top:0;
  background:#fff;padding:15px 6%;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  z-index:1000;
}
.logo{font-size:26px;font-weight:900;color:var(--primary);}

.hero{
  padding:120px 6% 80px;
  text-align:center;
  background:linear-gradient(135deg,#ffe6ef,#ffffff);
}
.hero img{
  width:300px;border-radius:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}
.hero h1{margin-top:20px;color:var(--primary);}
.hero button{
  margin-top:20px;
  padding:12px 30px;
  background:var(--primary);
  color:white;border:none;
  border-radius:30px;
  cursor:pointer;
}

.section{padding:70px 6%;text-align:center;}
.section h2{color:var(--primary);margin-bottom:30px;}

table{
  margin:auto;border-collapse:collapse;
  width:90%;max-width:600px;
}
td,th{border:1px solid #ddd;padding:10px;}
th{background:#f3f3f3;}

.product-images{
  display:flex;justify-content:center;
  gap:40px;flex-wrap:wrap;
}
.product-images img{
  width:250px;border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.punchline{
  background:var(--primary);
  color:white;text-align:center;
  padding:40px;font-size:20px;
  font-weight:700;
}

footer{
  background:#111;color:white;
  text-align:center;padding:20px;
}

/* Modal */
.overlay{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
}
.overlay.active{display:block;}

.modal{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;padding:25px;
  border-radius:15px;width:320px;
  transition:.3s;z-index:2000;
}
.modal.active{transform:translate(-50%,-50%) scale(1);}
.modal input,.modal select{
  width:100%;padding:8px;margin:8px 0;
}
.modal button{
  width:100%;padding:10px;
  background:var(--primary);
  color:white;border:none;
  margin-top:8px;cursor:pointer;
}
</style>
</head>
<body>

<header>
  <div class="logo">GOOD CHOICE</div>
</header>

<!-- HERO -->
<section class="hero">
  <img src="front.png" alt="Front View">
  <h1>Start Your Day the Healthy Way</h1>
  <button onclick="openOrderModal()">Order Now</button>
</section>

<!-- NUTRITION -->
<section class="section">
  <h2>Nutrition Facts (Per 100g)</h2>
  <table>
    <tr><th>Nutrient</th><th>Value</th></tr>
    <tr><td>Energy</td><td>409 Kcal</td></tr>
    <tr><td>Protein</td><td>12g</td></tr>
    <tr><td>Carbohydrates</td><td>75g</td></tr>
    <tr><td>Fat</td><td>8g</td></tr>
    <tr><td>Dietary Fibre</td><td>13g</td></tr>
  </table>
</section>

<!-- PRODUCT IMAGES -->
<section class="section">
  <h2>Product View</h2>
  <div class="product-images">
    <img src="front.png">
    <img src="back.png">
  </div>
</section>

<!-- PUNCHLINE -->
<section class="punchline">
  Good Choice Muesli – Sehat Ka Asli Fuel, Har Subah Powerful Start!
</section>

<footer>
  © 2026 Good Choice Crunchy Muesli
</footer>

<!-- MODAL -->
<div class="overlay" id="overlay"></div>

<div class="modal" id="orderModal">
<h3>Login / Signup</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<div id="orderSection" style="display:none;">
<hr>
<h3>Place Order</h3>
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="address" placeholder="Address">
<input type="text" id="mobile" placeholder="Mobile">
<select id="payment">
<option>Cash on Delivery</option>
<option>Online Payment</option>
</select>
<button onclick="placeOrder()">Submit Order</button>
</div>

<p id="successMsg" style="color:green;"></p>
<button onclick="closeOrderModal()">Close</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-3inpyWVAKLk34FcE_h5qpTTGsWgaGQg",
  authDomain: "good-choice-store.firebaseapp.com",
  projectId: "good-choice-store",
  storageBucket: "good-choice-store.firebasestorage.app",
  messagingSenderId: "159252788423",
  appId: "1:159252788423:web:bd1d5b1db0021edfa43ae2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.openOrderModal=()=>{
  document.getElementById("orderModal").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}
window.closeOrderModal=()=>{
  document.getElementById("orderModal").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

window.signup=async()=>{
  const email=email.value;
  const password=password.value;
  await createUserWithEmailAndPassword(auth,email,password);
  alert("Signup Successful");
}

window.login=async()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
  document.getElementById("orderSection").style.display="block";
}

window.placeOrder=async()=>{
  await addDoc(collection(db,"orders"),{
    name:name.value,
    address:address.value,
    mobile:mobile.value,
    payment:payment.value,
    createdAt:new Date()
  });
  successMsg.innerText="Order Placed Successfully 🔥";
}
</script>

</body>
</html>
