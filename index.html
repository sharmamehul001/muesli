<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Choice | Premium Crunchy Muesli</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#a0144f;
  --secondary:#d81b60;
  --accent:#ffca28;
  --dark:#111;
  --light:#fff;
  --radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{background:#fff;color:#111;}

header{
position:fixed;width:100%;top:0;left:0;
background:#fff;padding:18px 6%;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
z-index:1000;
}
.logo{font-size:28px;font-weight:900;color:var(--primary);}

.hero{
padding:140px 6%;
display:flex;justify-content:center;align-items:center;
flex-wrap:wrap;
background:linear-gradient(135deg,#ffe6ef,#ffffff);
min-height:100vh;
}
.hero-text{max-width:550px;}
.hero-text h2{font-size:45px;color:var(--primary);margin-bottom:20px;}
.hero-text p{margin-bottom:25px;font-size:16px;}

.hero-btn{
padding:15px 35px;
background:var(--primary);
color:#fff;text-decoration:none;
border-radius:50px;
font-weight:bold;
transition:.3s;
display:inline-block;
}
.hero-btn:hover{
background:var(--secondary);
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.hero-img img{
width:400px;
border-radius:20px;
margin-top:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

footer{
background:#111;color:#fff;
text-align:center;padding:30px;
}

.overlay{
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
top:0;left:0;
display:none;
z-index:1500;
}
.overlay.active{display:block;}

.popup{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
z-index:2000;
transition:.3s;
width:350px;
text-align:center;
}
.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.popup h3{
margin-bottom:15px;
color:var(--primary);
}

.popup input,.popup select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
}

.popup button{
padding:10px 20px;
border:none;
background:var(--primary);
color:#fff;
border-radius:50px;
margin-top:8px;
cursor:pointer;
width:100%;
font-weight:bold;
transition:.3s;
}
.popup button:hover{
background:var(--secondary);
}

.close-btn{
background:gray !important;
margin-top:15px;
}
.success{
color:green;
margin-top:10px;
font-weight:bold;
}
</style>
</head>
<body>

<header>
<div class="logo">GOOD CHOICE</div>
</header>

<section class="hero">
<div class="hero-text">
<h2>Start Your Day the Healthy Way</h2>
<p>Premium multi-grain breakfast cereal made with oats, almonds & seeds. Net Weight: <strong>400g</strong></p>
<a href="#" class="hero-btn" onclick="openOrderModal()">Order Now</a>
</div>
<div class="hero-img">
<img src="front.png" alt="Product">
</div>
</section>

<footer>
© 2026 Good Choice Crunchy Muesli | Made in India 🇮🇳
</footer>

<div class="overlay" id="overlay" onclick="closeOrderModal()"></div>

<div class="popup" id="orderModal">

<h3>Login / Signup</h3>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<div id="orderSection" style="display:none;margin-top:15px;">

<h3>Place Order</h3>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="address" placeholder="Address">
<input type="text" id="mobile" placeholder="Mobile Number">

<select id="payment">
<option>Cash on Delivery</option>
<option>Online Payment</option>
</select>

<button onclick="placeOrder()">Submit Order</button>
<div class="success" id="successMsg"></div>

</div>

<button onclick="closeOrderModal()" class="close-btn">Close</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:  "AIzaSyD-3inpyWVAKLk34FcE_h5qpTTGsWgaGQg",
  authDomain: "good-choice-store.firebaseapp.com",
  projectId: "good-choice-store",
  storageBucket: "good-choice-store.firebasestorage.app",
  messagingSenderId: "159252788423",
  appId: "1:159252788423:web:bd1d5b1db0021edfa43ae2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.openOrderModal = function(){
document.getElementById("orderModal").classList.add("active");
document.getElementById("overlay").classList.add("active");
}
window.closeOrderModal = function(){
document.getElementById("orderModal").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

window.signup = async function(){
const email = email.value;
const password = password.value;
try{
await createUserWithEmailAndPassword(auth,email,password);
alert("Signup Successful ✅");
}catch(error){alert(error.message);}
}

window.login = async function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
try{
await signInWithEmailAndPassword(auth,email,password);
alert("Login Successful ✅");
document.getElementById("orderSection").style.display="block";
}catch(error){alert(error.message);}
}

window.placeOrder = async function(){
const name=name.value;
const address=address.value;
const mobile=mobile.value;
const payment=payment.value;

await addDoc(collection(db,"orders"),{
name,address,mobile,payment,createdAt:new Date()
});

document.getElementById("successMsg").innerText="Order Placed Successfully 🔥";
setTimeout(()=>{closeOrderModal();},2000);
}
</script>

</body>
</html>
