<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Choice | Crunchy Muesli</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
}

.announcement-bar{
background:linear-gradient(135deg,#a0144f,#d81b60);
color:white;
text-align:center;
padding:12px;
font-weight:600;
}

.top-product{
text-align:center;
padding:25px 0;
background:linear-gradient(135deg,#fff5f7,#ffffff);
}

.top-product img{
max-width:220px;
border-radius:20px;
box-shadow:0 20px 50px rgba(160,20,79,0.25);
transition:0.4s;
}

.top-product img:hover{
transform:scale(1.05) rotate(-2deg);
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 5%;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.navbar .logo{
font-size:24px;
font-weight:bold;
color:#a0144f;
}

.hero{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:60px 20px;
background:#fff5f7;
}

.hero img{
max-width:350px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.nutrition{
padding:60px 20px;
text-align:center;
background:#111;
color:white;
}

.nutrition img{
max-width:350px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.4);
margin-top:20px;
}
</style>
</head>

<body>

<div class="announcement-bar">
🌟 Free Shipping on Orders Above ₹499 | 🇮🇳 Made in India | 🥇 Premium Quality Guaranteed
</div>

<div class="top-product">
<img src="front.png" alt="Front View">
</div>

<div class="navbar">
<div class="logo">Good Choice</div>
</div>

<section class="hero">
<h1>Start Your Day with Good Choice Muesli</h1>
<img src="front.png" alt="Hero Front View">
<p>Premium multi-grain breakfast cereal with oats, almonds & dried fruits.</p>
</section>

<section class="nutrition">
<h2>Nutrition Facts</h2>
<p>High Fibre • Omega 3 • Protein Rich</p>
<img src="back.png" alt="Back View">
</section>

</body>
</html>
